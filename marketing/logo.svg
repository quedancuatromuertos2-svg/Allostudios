<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&amp;display=swap');
    </style>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="170"/>
    </clipPath>
  </defs>
  <!-- Outer white square (transparent) -->
  <rect width="400" height="400" fill="white"/>
  <!-- Gray circle background -->
  <circle cx="200" cy="200" r="170" fill="#e4e0da"/>
  <!-- "allo" text in red -->
  <text
    x="200" y="195"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Playfair Display', Georgia, serif"
    font-size="110"
    font-weight="900"
    font-style="italic"
    fill="#d41f1f"
    letter-spacing="-3"
  >allo</text>
  <!-- "studios" text in black -->
  <text
    x="200" y="300"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Playfair Display', Georgia, serif"
    font-size="80"
    font-weight="900"
    font-style="italic"
    fill="#1a1614"
    letter-spacing="-2"
  >studios</text>
</svg>
